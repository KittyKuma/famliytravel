name: Deploy to GitHub Pages

# main 브랜치에 push하면 자동으로 배포됩니다. (빌드 없음 — 정적 파일 그대로 업로드)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .            # 저장소 전체(정적 파일)를 그대로 배포
      - id: deployment
        uses: actions/deploy-pages@v4
